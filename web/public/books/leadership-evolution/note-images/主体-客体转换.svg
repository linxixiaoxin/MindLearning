<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1536" viewBox="0 0 1024 1536" fill="none">
  <defs>
    <linearGradient id="paper" x1="80" y1="40" x2="944" y2="1496" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8F1E3"/>
      <stop offset="1" stop-color="#F2E5CE"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#D9C9AB" stroke-opacity="0.45" stroke-width="1.5"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#9A815B" flood-opacity="0.18"/>
    </filter>
    <style>
      .title { font: 700 86px "KaiTi","STKaiti","Noto Serif SC",serif; fill: #17130D; }
      .subtitle { font: 600 34px "KaiTi","STKaiti","Noto Serif SC",serif; fill: #2F2417; }
      .section { font: 700 36px "KaiTi","STKaiti","Noto Serif SC",serif; fill: #1F1A14; }
      .body { font: 500 28px "KaiTi","STKaiti","Noto Serif SC",serif; fill: #2A231A; }
      .small { font: 500 24px "KaiTi","STKaiti","Noto Serif SC",serif; fill: #3A3126; }
      .accent { font: 700 30px "KaiTi","STKaiti","Noto Serif SC",serif; fill: #8B4C28; }
      .stroke { stroke: #221B12; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .soft { stroke: #5E503B; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="1024" height="1536" fill="url(#paper)"/>
  <rect width="1024" height="1536" fill="url(#grid)"/>

  <g filter="url(#shadow)">
    <path class="stroke" d="M111 78C109 64 121 54 136 55H884C905 55 919 72 917 93L907 194C906 207 895 217 882 217H143C125 217 111 204 110 186L111 78Z" fill="#F0C768"/>
    <path class="soft" d="M143 64L119 42M872 67L899 43M898 183L926 202" />
    <text x="512" y="144" text-anchor="middle" class="title">主体 - 客体转换</text>
    <text x="512" y="198" text-anchor="middle" class="subtitle">原本裹挟我的，逐渐变成我可以观察的对象</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="70" y="280" width="388" height="860" rx="32" fill="#F6EEE0" class="stroke"/>
    <rect x="566" y="280" width="388" height="860" rx="32" fill="#F6EEE0" class="stroke"/>
    <rect x="368" y="412" width="288" height="596" rx="34" fill="#FAF5EB" class="stroke"/>
  </g>

  <g>
    <rect x="116" y="318" width="182" height="58" rx="18" fill="#DEE7CA" class="stroke"/>
    <text x="207" y="358" text-anchor="middle" class="section">主体</text>
    <rect x="612" y="318" width="182" height="58" rx="18" fill="#D9E8F1" class="stroke"/>
    <text x="703" y="358" text-anchor="middle" class="section">客体</text>
    <rect x="422" y="444" width="180" height="56" rx="18" fill="#F6D6AE" class="stroke"/>
    <text x="512" y="482" text-anchor="middle" class="section">转化路径</text>
  </g>

  <g>
    <text x="114" y="430" class="body">还在“主体里”时：</text>
    <text x="114" y="478" class="small">• 情绪像我自己，不像一个现象</text>
    <text x="114" y="520" class="small">• 角色、面子、规则直接主导判断</text>
    <text x="114" y="562" class="small">• 我会用它来反应，而不是看见它</text>

    <ellipse cx="264" cy="760" rx="118" ry="132" fill="#F2D38A" class="stroke"/>
    <circle cx="264" cy="692" r="38" fill="#17130D"/>
    <rect x="222" y="738" width="84" height="144" rx="34" fill="#17130D"/>
    <path class="stroke" d="M142 720C188 682 216 668 264 666" stroke="#C86F3E"/>
    <path class="stroke" d="M390 732C340 686 316 674 264 666" stroke="#C86F3E"/>
    <path class="stroke" d="M176 930C207 896 226 884 264 882" stroke="#C86F3E"/>
    <path class="stroke" d="M352 930C320 895 303 886 264 882" stroke="#C86F3E"/>

    <g filter="url(#shadow)">
      <rect x="108" y="645" width="116" height="66" rx="18" fill="#FFF6E9" class="soft"/>
      <text x="166" y="686" text-anchor="middle" class="accent">情绪就是我</text>
      <rect x="308" y="641" width="116" height="66" rx="18" fill="#FFF6E9" class="soft"/>
      <text x="366" y="682" text-anchor="middle" class="accent">规则就是我</text>
      <rect x="100" y="946" width="132" height="66" rx="18" fill="#FFF6E9" class="soft"/>
      <text x="166" y="987" text-anchor="middle" class="accent">角色就是我</text>
      <rect x="296" y="948" width="136" height="66" rx="18" fill="#FFF6E9" class="soft"/>
      <text x="364" y="989" text-anchor="middle" class="accent">习惯就是我</text>
    </g>

    <rect x="100" y="1046" width="324" height="74" rx="24" fill="#F9E3C2" class="stroke"/>
    <text x="262" y="1092" text-anchor="middle" class="body">体验：我被它裹挟着反应</text>
  </g>

  <g>
    <text x="610" y="430" class="body">转成“客体”后：</text>
    <text x="610" y="478" class="small">• 能把情绪、规则、角色拿出来看</text>
    <text x="610" y="520" class="small">• 能讨论、命名、比较并重新组织</text>
    <text x="610" y="562" class="small">• 我开始有选择，而不只剩自动反应</text>

    <rect x="632" y="650" width="250" height="176" rx="28" fill="#FFF8EC" class="stroke"/>
    <rect x="656" y="674" width="202" height="132" rx="20" fill="#F5E4BD" class="soft"/>
    <path class="soft" d="M692 706H822M692 742H804M692 778H794" />
    <circle cx="670" cy="706" r="8" fill="#C86F3E"/>
    <circle cx="670" cy="742" r="8" fill="#89A06E"/>
    <circle cx="670" cy="778" r="8" fill="#6F93B8"/>
    <circle cx="612" cy="734" r="40" fill="#D8E7EF" class="stroke"/>
    <path class="soft" d="M635 760L662 786" />
    <circle cx="606" cy="728" r="18" fill="none" class="soft"/>

    <g filter="url(#shadow)">
      <rect x="602" y="886" width="144" height="66" rx="18" fill="#FFF6E9" class="soft"/>
      <text x="674" y="927" text-anchor="middle" class="accent">能命名</text>
      <rect x="780" y="886" width="144" height="66" rx="18" fill="#FFF6E9" class="soft"/>
      <text x="852" y="927" text-anchor="middle" class="accent">能讨论</text>
      <rect x="602" y="974" width="144" height="66" rx="18" fill="#FFF6E9" class="soft"/>
      <text x="674" y="1015" text-anchor="middle" class="accent">能调整</text>
      <rect x="780" y="974" width="144" height="66" rx="18" fill="#FFF6E9" class="soft"/>
      <text x="852" y="1015" text-anchor="middle" class="accent">能选择</text>
    </g>

    <rect x="600" y="1046" width="330" height="74" rx="24" fill="#D9E8F1" class="stroke"/>
    <text x="765" y="1092" text-anchor="middle" class="body">体验：我开始看见并重组它</text>
  </g>

  <g>
    <path class="stroke" d="M512 536V918" stroke="#9C6A34" stroke-dasharray="10 12"/>
    <path class="stroke" d="M446 560C474 590 490 614 512 648C534 614 550 590 578 560" stroke="#9C6A34"/>
    <path class="stroke" d="M446 882C474 852 490 828 512 794C534 828 550 852 578 882" stroke="#9C6A34"/>

    <rect x="392" y="596" width="240" height="104" rx="24" fill="#FFF7E7" class="stroke"/>
    <text x="512" y="638" text-anchor="middle" class="body">1. 先被触发</text>
    <text x="512" y="676" text-anchor="middle" class="small">看见“是什么在主导我”</text>

    <rect x="392" y="730" width="240" height="104" rx="24" fill="#FFF7E7" class="stroke"/>
    <text x="512" y="772" text-anchor="middle" class="body">2. 把它拿出来</text>
    <text x="512" y="810" text-anchor="middle" class="small">命名、描述、请他人一起看</text>

    <rect x="392" y="864" width="240" height="104" rx="24" fill="#FFF7E7" class="stroke"/>
    <text x="512" y="906" text-anchor="middle" class="body">3. 慢慢重组</text>
    <text x="512" y="944" text-anchor="middle" class="small">形成新的理解与行动空间</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="90" y="1182" width="844" height="214" rx="34" fill="#FBF4E8" class="stroke"/>
    <rect x="122" y="1216" width="218" height="118" rx="24" fill="#F4E3BB" class="soft"/>
    <text x="231" y="1260" text-anchor="middle" class="body">不是一次顿悟</text>
    <text x="231" y="1304" text-anchor="middle" class="small">而是长期练习</text>
    <rect x="402" y="1216" width="218" height="118" rx="24" fill="#DDE8CC" class="soft"/>
    <text x="511" y="1260" text-anchor="middle" class="body">关键动作</text>
    <text x="511" y="1304" text-anchor="middle" class="small">停一下、命名它、讨论它</text>
    <rect x="682" y="1216" width="218" height="118" rx="24" fill="#D9E7EF" class="soft"/>
    <text x="791" y="1260" text-anchor="middle" class="body">真正变化</text>
    <text x="791" y="1304" text-anchor="middle" class="small">从“我是它”到“我看见它”</text>
    <text x="512" y="1378" text-anchor="middle" class="section">成长不是多知道一点，而是和自己的关系变了</text>
  </g>

  <g>
    <text x="84" y="1472" class="small">主体 - 客体转换概念卡</text>
    <text x="804" y="1472" class="small">@ 林子·心智进化之路</text>
  </g>
</svg>
