  <text x="108" y="408" fill="#f7f5f0" font-size="28" font-family="Aptos, Segoe UI, Microsoft YaHei, sans-serif" fill-opacity="0.84">这本书讨论的不是怎么当权威型上司，而是一个知识工作</text>
